---
name: lint

on:
  - pull_request

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
      - name: Run actionlint
        run: actionlint

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Install tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
      - name: Run yamllint
        run: yamllint .
