---
name: lint

on:
  - pull_request

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - name: Run actionlint
        run: actionlint

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Install tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151  # v4.0.1
      - name: Run yamllint
        run: yamllint .
