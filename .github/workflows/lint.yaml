---
name: lint

on:
  - pull_request

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
      - name: Run actionlint
        run: actionlint

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Install tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
      - name: Run yamllint
        run: yamllint .
