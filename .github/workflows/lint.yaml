---
name: lint

on:
  - pull_request

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Install tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
      - name: Run actionlint
        run: actionlint

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - name: Install tools
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925  # v4.1.0
      - name: Run yamllint
        run: yamllint .
